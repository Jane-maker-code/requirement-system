<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 测试</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover {
            opacity: 0.9;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🧪 项目创建 API 测试</h1>
        <form id="testForm">
            <div class="form-group">
                <label>项目名称</label>
                <input type="text" id="projectName" value="测试项目 ABC" required>
            </div>
            <div class="form-group">
                <label>项目负责人</label>
                <input type="text" id="projectOwner" value="张三" required>
            </div>
            <div class="form-group">
                <label>项目概述</label>
                <textarea id="projectDesc" rows="3" required>这是一个测试项目</textarea>
            </div>
            <button type="submit">🚀 提交项目</button>
        </form>
        
        <div id="result"></div>
    </div>

    <script>
        document.getElementById('testForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.className = '';
            resultDiv.innerHTML = '⏳ 正在提交...';
            
            const project = {
                name: document.getElementById('projectName').value.trim(),
                owner: document.getElementById('projectOwner').value.trim(),
                description: document.getElementById('projectDesc').value.trim()
            };
            
            console.log('Submitting project:', project);
            
            fetch('/api/add_project', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(project)
            })
            .then(response => {
                console.log('Response status:', response.status);
                return response.json();
            })
            .then(data => {
                console.log('Response data:', data);
                if (data.success) {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `
                        <strong>✅ 成功！</strong><br>
                        项目 ID: ${data.id}<br>
                        消息：${data.message}
                    `;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerHTML = `<strong>❌ 失败：</strong> ${data.error}`;
                }
            })
            .catch(error => {
                console.error('Error:', error);
                resultDiv.className = 'error';
                resultDiv.innerHTML = `<strong>❌ 网络错误：</strong> ${error.message}`;
            });
        });
    </script>
</body>
</html>
